<!DOCTYPE html>
<html>
    <head>
        <title>Форма цели</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <style>
            .card {
                transition: transform 0.2s, box-shadow 0.2s;
            }
            .card:hover {
                transform: translateY(-5px);
                box-shadow: 0 1rem 3rem rgba(0,0,0,.15) !important;
            }
        </style>
    </head>
    <body style="background-color: azure;">
        <div class="container my-5 d-flex align-items-center flex-column">
            <div class="card shadow-lg border-0 rounded-4 h-100 col-lg-5">
                <div class="card-header bg-white border-0 pt-4 pb-0">
                    <h4 class="text-center fw-semibold d-flex justify-content-center">
                        <i class="bi bi-plus me-2 text-secondary"></i>
                        <p class="m-0" th:text="${goal.id} == null ? 'Добавление цели' : 'Редактирование цели'"></p>
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form class="my-3" action="#" th:action="@{${goal.id == null ? '/goals' : '/goals/' + goal.id}}"
                        th:object="${goal}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="projectId" th:value="${projectId}" />

                        <div class="form-floating">
                            <input type="text" class="form-control" id="name" name="name" 
                                placeholder="Название" th:field="*{name}" required></input>
                            <label for="name">Название</label>
                        </div>
                        <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}"
                        style="color:red"></span><br>

                        <div class="form-floating">
                            <textarea class="form-control" id="comment" name="comment" style="min-height: 200px; width: 100%;" 
                                placeholder="Описание" th:field="*{description}"></textarea>
                            <label for="comment">Описание</label>
                        </div><br>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg d-flex justify-content-center">
                                <i class="bi bi-check-lg"></i> Сохранить
                            </button>
                            <a class="btn btn-outline-secondary" th:href="@{/projects/{pid}(pid = ${projectId})}">
                                <i class="bi bi-arrow-left"></i> Назад к списку
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </body>
</html>
