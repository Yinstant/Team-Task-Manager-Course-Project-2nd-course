<!DOCTYPE html>
<html>
    <head>
        <title>Форма цели</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body style="background-color: azure;">
        <div class="container border border-3 border-danger rounded my-5 
            d-flex align-items-center flex-column col-md-4 shadow bg-light">
            <h1 class="my-3" th:text="${goal.id} == null ? 'Добавление цели' : 'Редактирование цели'"></h1>
            <form class="my-3" action="#" th:action="@{${goal.id == null ? '/goals' : '/goals/' + goal.id}}"
                th:object="${goal}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="projectId" th:value="${projectId}" />
                <label class="my-3">Название: <input type="text" th:field="*{name}"></label>
                <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}"
                style="color:red"></span><br>
                <label class="my-3">Описание: <textarea th:field="*{description}"></textarea></label><br>
                
                <button class="btn btn-primary my-3 d-block mx-auto" type="submit">Сохранить</button>
            </form>
            <a class="my-3" th:href="@{/projects/{pid}(pid = ${projectId})}">Назад к списку</a>
        </div>
    </body>
</html>
