<!DOCTYPE html>
<html>
<head>
    <title>Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body style="background-color: azure;">
    <div class="auth-card p-4 p-md-5">
        <div class="text-center mb-4">
            <i class="bi bi-person-circle fs-1 text-secondary"></i>
            <h1 class="h3 mt-2 fw-bold">Присоединяйтесь!</h1>
            <p class="text-muted">Пройдите регистрацию</p>
        </div>

        <form method="post" th:action="@{/register}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="mb-3 input-icon">
                <i class="bi bi-person-fill"></i>
                <input type="text" name="username" class="form-control" placeholder="Логин" required autofocus>
            </div>

            <div class="mb-4 input-icon">
                <i class="bi bi-lock-fill"></i>
                <input type="password" name="password" class="form-control" placeholder="Пароль" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-login">
                <i class="bi bi-person-plus me-1"></i>Зарегистрироваться
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="/login" class="register-link">
                <i class="bi bi-box-arrow-in-right me-2"></i>Уже есть аккаунт?
            </a>
        </div>
    </div>
</body>
</html>
