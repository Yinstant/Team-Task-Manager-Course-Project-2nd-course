<!DOCTYPE html>
<html>
    <head>
        <title>Регистрация</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body style="background-color: azure;">
        <div class="container border border-3 border-danger rounded my-5 
            d-flex align-items-center flex-column col-md-4 shadow bg-light">
            <h1 class="my-3">Регистрация</h1>
            <form class="my-3" action="#" th:action="@{/register}"
            th:object="${user}" method="post">
                <label class="my-3">Логин: <input type="text" th:field="*{username}"></label>
                <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}"
                style="color:red"></span><br>
                
                <label class="my-3">Пароль: <input type="password" th:field="*{password}"></label>
                <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
                style="color:red"></span><br>
                
                <button class="btn btn-primary my-3 d-block mx-auto" type="submit">Зарегистрироваться</button>
            </form>
            <a class="my-3" href="/login">К авторизации</a>
        </div>
    </body>
</html>
