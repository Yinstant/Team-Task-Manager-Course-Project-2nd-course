<div th:fragment="detailed-task-card(task)">
    <div class="card shadow-lg border-0 rounded-4 overflow-hidden card-detail h-100">
        <div class="card-body p-4">
            <!-- Заголовок с цветной полосой -->
            <div th:classappend="${task.priority.name() == 'High'} ? 'border-start border-danger border-4' : 
                                (${task.priority.name() == 'Medium'} ? 'border-start border-primary border-4' : '')" 
                    class="ps-3">
                <h3 class="card-title fw-bold" th:text="${task.name}">Название задачи</h3>
                <div class="d-flex flex-wrap gap-3 mt-2 mb-3">
                    <span class="badge bg-secondary" th:text="'Проект: ' + ${task.project.name}"></span>
                    <span class="badge bg-info text-dark" th:if="${task.goal != null}" th:text="'Цель: ' + ${task.goal.name}"></span>
                    <span class="badge bg-warning text-dark" th:text="'Приоритет: ' + ${task.priority}"></span>
                    <span class="badge bg-success" th:text="'Story Points: ' + ${task.storyPoints}" th:if="${task.storyPoints != null}"></span>
                </div>
            </div>

            <hr class="my-3">

            <div class="row">
                <div class="col-md-6">
                    <p><i class="bi bi-calendar-event me-2"></i> <strong>Дедлайн:</strong> <span th:text="${#temporals.format(task.deadline, 'dd.MM.yyyy')}"></span></p>
                    <p><i class="bi bi-clock-history me-2"></i> <strong>Создана:</strong> <span th:text="${#temporals.format(task.creationTime, 'dd.MM.yyyy HH:mm')}"></span></p>
                </div>
                <div class="col-md-6">
                    <p><i class="bi bi-arrow-repeat me-2"></i> <strong>Обновлена:</strong> <span th:text="${#temporals.format(task.updatedTime, 'dd.MM.yyyy HH:mm')}"></span></p>
                </div>
            </div>

            <h5 class="mt-3"><i class="bi bi-card-text me-2"></i>Описание:</h5>
            <div class="bg-light p-3 rounded-3">
                <p class="mb-0" th:text="${task.description}"></p>
            </div>
        </div>
    </div>
</div>
