<div th:fragment="project-list">
    <h3>Проекты</h3>
    <a href="/projects/new" class="btn btn-sm col-12 btn-primary my-3">+ Новый проект</a>
    <ul class="nav flex-column">
        <li th:each="project : ${projects}" class="nav-item my-1 border-bottom border-2">
            <div class="card col-12 h-100 shadow-sm border-0 rounded-4 overflow-hidden hover-shadow transition-all">
                <div class="card-body d-flex align-items-center py-0 
                d-flex align-items-center justify-content-between">
                    <a class="nav-link d-inline-block me-auto text-truncate" style="max-width: 140px;" 
                        th:href="@{/projects/{pid}(pid = ${project.id})}" 
                        th:text="${project.name}" 
                        th:if="${!isKanban}"></a>
                    
                    <a class="nav-link d-inline-block me-auto text-truncate" style="max-width: 140px;" 
                        th:href="@{/projects/{pid}/kanban(pid = ${project.id})}" 
                        th:text="${project.name}" 
                        th:if="${isKanban}"></a>

                    <div class="flex-shrink-0">
                        <a class="btn btn-sm btn-outline-danger float-end mx-2 ms-auto" 
                            th:href="@{/projects/{id}/delete(id=${project.id})}"
                            th:if="${projectService.IsCurrentLeader(project.id)}">
                            <i class="bi bi-trash"></i>
                        </a>

                        <a class="btn btn-sm btn-outline-warning float-end mx-1 ms-auto" 
                            th:href="@{/projects/{id}/edit(id=${project.id})}"
                            th:if="${projectService.IsCurrentLeader(project.id)}">
                            <i class="bi bi-pencil-square"></i>
                        </a>

                        <a class="btn btn-sm float-end mx-1 ms-auto"
                            th:href="@{/projects/{id}/invite(id=${project.id})}"
                            th:if="${projectService.IsCurrentManager(project.id) || projectService.IsCurrentLeader(project.id)}">
                            <i class="bi-person-plus-fill"></i>
                        </a>
                    </div>
                </div>
            </div>
        </li>
    </ul>
</div>
