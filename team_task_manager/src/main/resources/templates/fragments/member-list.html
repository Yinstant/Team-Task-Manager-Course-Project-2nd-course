<div th:fragment="member-list" th:if="${currentProject != null}" class="my-3">
    <h3 th:text="'Участники проекта: ' + ${currentProject.name}">Участники проекта</h3>
    <ul class="nav flex-column">
        <li th:each="member : ${members}" class="nav-item d-flex align-items-center justify-content-between my-1 border-bottom border-2">
            <div class="card col-12 h-100 shadow-sm border-0 rounded-4 overflow-hidden hover-shadow transition-all">
                <div class="card-body d-flex align-items-center pb-0">
                    <h6 class="nav-link d-inline-block me-auto text-truncate" style="max-width: 140px;" 
                    th:text="${member.user.username}"></h6>

                    <div class="flex-shrink-0">
                        <a th:if="${projectService.IsCurrentLeader(currentProject.id) || projectService.IsCurrentManager(currentProject.id)}"
                           class="btn btn-sm btn-outline-danger"
                           th:href="@{/projects/{id}/exclude(id=${currentProject.id}, username=${member.user.username})}">
                            <i class="bi bi-person-x"></i>
                        </a>

                        <a th:if="${projectService.IsCurrentLeader(currentProject.id)}"
                           class="btn btn-sm btn-outline-warning"
                           th:href="@{/projects/{id}/editRoles(id=${currentProject.id}, username=${member.user.username})}">
                            <i class="bi bi-pencil-square"></i>
                        </a>
                    </div>
                </div>
                <div class="card-footer bg-transparent border-0 d-flex flex-wrap align-items-center justify-content-end gap-1">
                    <div class="d-flex flex-wrap gap-1">
                        <span th:each="role : ${member.roles}" class="badge bg-secondary" th:text="${role.name()}"></span>
                    </div>
                </div>
            </div>
        </li>
    </ul>
    <style>
        .hover-shadow:hover {
            transform: translateY(-2px);
            box-shadow: 0 1rem 2rem rgba(0,0,0,.1) !important;
        }
        .transition-all {
            transition: all 0.2s ease-in-out;
        }
    </style>
</div>
