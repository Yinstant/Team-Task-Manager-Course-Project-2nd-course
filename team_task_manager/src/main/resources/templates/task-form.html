<!DOCTYPE html>
<html>
    <head>
        <title>Форма задачи</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body style="background-color: azure;">
        <div class="container border border-3 border-danger rounded my-5 
            d-flex align-items-center flex-column col-md-4 shadow bg-light">
            <h1 class="my-3" th:text="${task.id} == null ? 'Добавление задачи' : 'Редактирование задачи'"></h1>
            <form class="my-3" action="#" th:action="@{${task.id == null ? '/tasks' : '/tasks/' + task.id}}"
            th:object="${task}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="projectId" th:value="${projectId}" />

                <label class="my-3">Название: <input type="text" th:field="*{name}"></label><br>
                <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}"
                style="color:red"></span><br>

                <label class="my-3">Описание: <textarea th:field="*{description}"></textarea></label><br>

                <label class="my-3">Дедлайн: <input type="date" th:field="*{deadline}"></label><br>
                <span th:if="${#fields.hasErrors('deadline')}" th:errors="*{deadline}"
                style="color:red"></span><br>

                <label class="my-3">
                    Статус:
                    <select th:field="*{status}">
                        <option th:value="'ToDo'">TO DO</option>
                        <option th:value="'InProgress'">IN PROGRESS</option>
                        <option th:value="'Review'">REVIEW</option>
                        <option th:value="'Completed'">COMPLETED</option>
                    </select>
                </label><br>
                <span th:if="${#fields.hasErrors('status')}" th:errors="*{status}"
                style="color:red"></span><br>

                <label class="my-3">Story Points: 
                    <input type="number" th:field="*{storyPoints}"></label><br>
                <span th:if="${#fields.hasErrors('storyPoints')}" th:errors="*{storyPoints}"
                style="color:red"></span><br>

                <label class="my-3">Приоритет: 
                    <select th:field="*{priority}">
                        <option th:value="'High'">HIGH</option>
                        <option th:value="'Medium'">MEDIUM</option>
                        <option th:value="'Low'">LOW</option>
                    </select>
                </label><br>
                <span th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}"
                style="color:red"></span><br>

                <label class="my-3 d-block mx-auto">
                    Цель:
                    <select name="goalId" class="form-select">
                        <option value="">- Без цели -</option>
                        <option th:each="g : ${goals}"
                        th:value="${g.id}"
                        th:text="${g.name}"
                        th:selected="${task.goal != null and task.goal.id == g.id}"></option>
                    </select>
                </label><br>
                <span th:if="${#fields.hasErrors('goal')}" th:errors="*{goal}"
                style="color:red"></span><br>
                
                <button class="btn btn-primary my-3 d-block mx-auto" type="submit">Сохранить</button>
            </form>
            <a class="my-3" th:href="@{/projects/{pid}(pid = ${projectId})}">Назад к списку</a>
        </div>
    </body>
</html>
