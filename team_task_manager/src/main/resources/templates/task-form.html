<!DOCTYPE html>
<html>
    <head>
        <title>Форма задачи</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <style>
            .card {
                transition: transform 0.2s, box-shadow 0.2s;
            }
            .card:hover {
                transform: translateY(-5px);
                box-shadow: 0 1rem 3rem rgba(0,0,0,.15) !important;
            }
        </style>
    </head>
    <body style="background-color: azure;">
        <div class="container my-5 d-flex align-items-center flex-column">
            <div class="card shadow-lg border-0 rounded-4 h-100 col-lg-8">
                <div class="card-header bg-white border-0 pt-4 pb-0">
                    <h4 class="text-center fw-semibold d-flex justify-content-center">
                        <i class="bi bi-plus me-2 text-secondary"></i>
                        <p class="m-0" th:text="${task.id} == null ? 'Добавление задачи' : 'Редактирование задачи'"></p>
                    </h4>
                </div>

                <div class="card-body p-4">
                    <form class="my-3" action="#" th:action="@{${task.id == null ? '/tasks' : '/tasks/' + task.id}}"
                    th:object="${task}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="projectId" th:value="${projectId}" />
                        <input type="hidden" th:field="*{status}"/>

                        <div class="row my-3">
                            <div class="col-5">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="name" name="name" 
                                        placeholder="Название" th:field="*{name}" required></input>
                                    <label for="name">Название</label>
                                </div>
                                <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}"
                                style="color:red"></span><br>
                                
                                <div class="form-floating">
                                    <input type="number" class="form-control" id="storyPoints" name="storyPoints" 
                                        th:field="*{storyPoints}" min="1" max="10" placeholder="Story Points" required>
                                    <label for="storyPoints">Story Points</label>
                                </div>
                                <span th:if="${#fields.hasErrors('storyPoints')}" th:errors="*{storyPoints}"
                                style="color:red"></span><br>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold"><i class="bi bi-tag me-1"></i> Дедлайн</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-calendar-event"></i></span>
                                        <input type="date" class="form-control" id="deadline" th:field="*{deadline}" required>
                                    </div>
                                </div>
                                <span th:if="${#fields.hasErrors('deadline')}" th:errors="*{deadline}"
                                style="color:red"></span><br>
        
                                <div class="mb-4">
                                    <label class="form-label fw-semibold"><i class="bi bi-tag me-1"></i> Приоритет</label>
                                    <select th:field="*{priority}" class="form-select form-select-lg" required>
                                        <option value="" disabled selected>-- Выберите приоритет --</option>
                                        <option th:value="'High'">HIGH</option>
                                        <option th:value="'Medium'">MEDIUM</option>
                                        <option th:value="'Low'">LOW</option>
                                    </select>
                                    <div class="form-text">Выберите приоритет для задачи.</div>
                                </div>
        
                                <div class="mb-4">
                                    <label class="form-label fw-semibold"><i class="bi bi-tag me-1"></i> Цель</label>
                                    <select name="goalId" class="form-select form-select-lg" required>
                                        <option value="">-- Без цели --</option>
                                        <option th:each="g : ${goals}"
                                        th:value="${g.id}"
                                        th:text="${g.name}"
                                        th:selected="${task.goal != null and task.goal.id == g.id}"></option>
                                    </select>
                                    <div class="form-text">Выберите цель для задачи.</div>
                                </div>
                            </div>
                            <div class="col-7">
                                <div class="h-100 d-flex flex-column">
                                    <div class="form-floating flex-grow-1">
                                        <textarea class="form-control h-100" id="description" name="description" 
                                            placeholder="Описание" th:field="*{description}" style="min-height: 300px; resize: vertical;"></textarea>
                                        <label for="description">Описание</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg d-flex justify-content-center">
                                <i class="bi bi-check-lg"></i> Сохранить
                            </button>
                            <a class="btn btn-outline-secondary" th:href="@{/projects/{pid}(pid = ${projectId})}">
                                <i class="bi bi-arrow-left"></i> Назад к списку
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </body>
</html>
