<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <title>Task Manager</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <style>
            .light-blue{
                background-color: rgb(199, 254, 254);
            }
        </style>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark" th:replace="~{fragments/navbar :: navbar}"></nav>

        <div class="offcanvas offcanvas-start" tabindex="-1"
        id="sidebarOffcanvas" aria-laballedby="sidebarLabel">
            <div class="offcanvas-header">
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas"
                aria-label="Закрыть"></button>
            </div>
            <div class="offcanvas-body bg-light" th:insert="~{fragments/sidebar :: sidebar}"></div>
        </div>

        <div class="container-fluid">
            <div class="row">
                <div class="col-lg-3 d-lg-block d-none bg-light" th:insert="~{fragments/sidebar :: sidebar}"></div>
                
                <div class="col-lg-9 p-4" th:if="${currentProject == null}">
                    <div class="text-center py-5">
                        <i class="bi bi-folder2-open" style="font-size: 4rem; color: #6c757d;"></i>
                        <h3 class="mt-3 text-muted">Проект не выбран</h3>
                        <p class="text-secondary">Выберите проект из левого меню или создайте новый</p>
                    </div>
                </div>

                <div class="col-lg-9" th:if="${currentProject != null}">
                    <div class="d-flex align-items-center gap-3 my-5 px-4">
                        <h1 class="text-truncate mb-0" th:text="${currentProject.name}"></h1>
                        <span class="badge bg-secondary align-middle">Канбан-доска</span>
                    </div>
                    
                    <div class="d-flex mx-3 pb-3">
                        <a class="btn btn-primary mx-3" th:href="@{/tasks/new(projectId=${currentProject.id})}"
                            th:if="${projectService.IsCurrentManager(currentProject.id)}">+ Новая задача</a>
                    </div>
                    
                    <div th:if="${message}" th:text="${message}" style="color:green"></div>
                    
                    <div class="row justify-content-between mx-2 row-cols-1 row-cols-lg-5">
                        <div class="card">
                            <div class="card-header bg-secondary text-white">
                                <i class="bi bi-hourglass-split me-1"></i> Бэклог (TO DO)
                                <span class="badge bg-secondary rounded-pill" 
                                    th:text="${tasksByStatus['ToDo'] == null ? 0 : #lists.size(tasksByStatus['ToDo'])}">0</span>
                            </div>
                            <div class="card-body">
                                <div class="d-flex flex-column gap-3">
                                    <div th:each="task : ${tasksByStatus['ToDo']}">
                                        <div th:replace="~{fragments/task-cards/kanban-task-card :: 
                                            kanban-task-card(task=${task}, status='ToDo', btnText='В работу', isActive=${projectService.IsCurrentManager(currentProject.id)})}"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="card">
                            <div class="card-header bg-danger text-white">
                                <i class="bi bi-arrow-repeat me-1"></i> IN PROGRESS
                                <span class="badge bg-secondary rounded-pill" 
                                    th:text="${tasksByStatus['InProgress'] == null ? 0 : #lists.size(tasksByStatus['InProgress'])}">0</span>
                            </div>
                            <div class="card-body">
                                <div class="d-flex flex-column gap-3">
                                    <div th:each="task : ${tasksByStatus['InProgress']}">
                                        <div th:replace="~{fragments/task-cards/kanban-task-card :: 
                                            kanban-task-card(task=${task}, status='InProgress', btnText='На проверку', isActive=${projectService.IsCurrentExecutor(currentProject.id)})}"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="card">
                            <div class="card-header bg-dark text-white">
                                <i class="bi bi-eye me-1"></i> Review
                                <span class="badge bg-secondary rounded-pill" 
                                    th:text="${tasksByStatus['Review'] == null ? 0 : #lists.size(tasksByStatus['Review'])}">0</span>
                            </div>
                            <div class="card-body">
                                <div class="d-flex flex-column gap-3">
                                    <div th:each="task : ${tasksByStatus['Review']}">
                                        <div th:replace="~{fragments/task-cards/kanban-task-card :: 
                                            kanban-task-card(task=${task}, status='Review', btnText='На рассмотрение', isActive=${projectService.IsCurrentTester(currentProject.id)})}"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="card">
                            <div class="card-header bg-warning text-white">
                                <i class="bi bi-clipboard-check me-1"></i> CHECKING
                                <span class="badge bg-secondary rounded-pill" 
                                    th:text="${tasksByStatus['Checking'] == null ? 0 : #lists.size(tasksByStatus['Checking'])}">0</span>
                            </div>
                            <div class="card-body">
                                <div class="d-flex flex-column gap-3">
                                    <div th:each="task : ${tasksByStatus['Checking']}">
                                        <div th:replace="~{fragments/task-cards/kanban-task-card :: 
                                            kanban-task-card(task=${task}, status='Checking', btnText='Рассмотреть', isActive=${projectService.IsCurrentManager(currentProject.id)})}"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="card">
                            <div class="card-header bg-success text-white">
                                <i class="bi bi-check2-all me-1"></i> COMPLETED
                                <span class="badge bg-secondary rounded-pill" 
                                    th:text="${tasksByStatus['Completed'] == null ? 0 : #lists.size(tasksByStatus['Completed'])}">0</span>
                            </div>
                            <div class="card-body">
                                <div class="d-flex flex-column gap-3">
                                    <div th:each="task : ${tasksByStatus['Completed']}">
                                        <div th:replace="~{fragments/task-cards/kanban-task-card :: 
                                            kanban-task-card(task=${task}, status='Completed', btnText='Вернуть', isActive=${projectService.IsCurrentManager(currentProject.id)})}"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:replace="~{fragments/task-modal :: task-modal}"></div>
        <script src="/js/script.js"></script>
        <script>
            function toggleTasks(element){
                element.classList.toggle('active');
            }
        </script>
    </body>
</html>
