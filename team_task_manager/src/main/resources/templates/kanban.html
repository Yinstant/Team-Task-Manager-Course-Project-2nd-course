<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <title>Task Manager</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <style>
            .tree .goal-header {
                cursor: pointer;
                background-color: #ffeaa6;
                padding: 8px;
                margin-top: 8px;
                margin-bottom: 4px;
                border-radius: 4px;
            }
            .tree .task-list {
                margin-left: 20px;
                display: none;
            }
            .tree .goal-header.active + .task-list {
                display: block;
            }
            .light-blue{
                background-color: rgb(199, 254, 254);
            }
        </style>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark" th:replace="~{fragments/navbar :: navbar}"></nav>

        <div class="offcanvas offcanvas-start" tabindex="-1"
        id="sidebarOffcanvas" aria-laballedby="sidebarLabel">
            <div class="offcanvas-header">
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas"
                aria-label="Закрыть"></button>
            </div>
            <div class="offcanvas-body bg-light" th:insert="~{fragments/sidebar :: sidebar}"></div>
        </div>

        <div class="container-fluid">
            <div class="row">
                <div class="col-lg-3 d-lg-block d-none bg-light" th:insert="~{fragments/sidebar :: sidebar}"></div>
                
                <div class="col-md-9" th:if="${currentProject == null}">
                    <h1>Выберите проект из левого меню</p>
                </div>

                <div class="col-md-9" th:if="${currentProject != null}">
                    <h1 class="my-5 text-truncate" th:text="'Канбан-доска проекта: ' + ${currentProject.name}"></h1>
                    
                    <div class="d-flex mx-3 pb-3">
                        <a class="btn btn-primary mx-3" th:href="@{/tasks/new(projectId=${currentProject.id})}"
                            th:if="${projectService.IsCurrentManager(currentProject.id)}">+ Новая задача</a>
                    </div>
                    
                    <div th:if="${message}" th:text="${message}" style="color:green"></div>
                    
                    <div class="row justify-content-between mx-2">
                        <div class="card col-2">
                            <div class="card-header bg-secondary text-white">Бэклог (TO DO)</div>
                            <div class="card-body">
                                <div class="card mb-2" th:each="task : ${tasksByStatus['ToDo']}">
                                    <div class="card-body border-start border-4" th:classappend="${task.priority.name() == 'High'} ? 
                                        'border-danger' : (${task.priority.name() == 'Medium'} ? 
                                        'border-primary' : '')">
                                        <h5 th:text="${task.name}"></h5>
                                        <small th:text="${task.deadline}"></small>
                                        <small th:text="'Story Points: ' + ${task.storyPoints}" th:if="${task.storyPoints != null}"></small>
                                        <form th:action="@{/tasks/{id}/status(id=${task.id}, projectId=${currentProject.id})}" method="post">
                                            <input type="hidden" name="oldStatus" value="ToDo">
                                            <button type="submit" class="btn btn-sm btn-primary mt-2"
                                                th:if="${projectService.IsCurrentManager(currentProject.id)}">
                                                <i class="bi bi-arrow-right"></i>
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="card col-2">
                            <div class="card-header bg-secondary text-white">IN PROGRESS</div>
                            <div class="card-body">
                                <div class="card mb-2" th:each="task : ${tasksByStatus['InProgress']}">
                                    <div class="card-body border-start border-4" th:classappend="${task.priority.name() == 'High'} ? 
                                        'border-danger' : (${task.priority.name() == 'Medium'} ? 
                                        'border-primary' : '')">
                                        <h5 th:text="${task.name}"></h5>
                                        <small th:text="${task.deadline}"></small>
                                        <small th:text="'Story Points: ' + ${task.storyPoints}" th:if="${task.storyPoints != null}"></small>
                                        <form th:action="@{/tasks/{id}/status(id=${task.id}, projectId=${currentProject.id})}" method="post">
                                            <input type="hidden" name="oldStatus" value="InProgress">
                                            <button type="submit" class="btn btn-sm btn-primary mt-2"
                                                th:if="${projectService.IsCurrentExecutor(currentProject.id)}">
                                                <i class="bi bi-arrow-right"></i>
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="card col-2">
                            <div class="card-header bg-secondary text-white">Review</div>
                            <div class="card-body">
                                <div class="card mb-2" th:each="task : ${tasksByStatus['Review']}">
                                    <div class="card-body border-start border-4" th:classappend="${task.priority.name() == 'High'} ? 
                                        'border-danger' : (${task.priority.name() == 'Medium'} ? 
                                        'border-primary' : '')">
                                        <h5 th:text="${task.name}"></h5>
                                        <small th:text="${task.deadline}"></small>
                                        <small th:text="'Story Points: ' + ${task.storyPoints}" th:if="${task.storyPoints != null}"></small>
                                        <form th:action="@{/tasks/{id}/status(id=${task.id}, projectId=${currentProject.id})}" method="post">
                                            <input type="hidden" name="oldStatus" value="Review">
                                            <button type="submit" class="btn btn-sm btn-primary mt-2"
                                                th:if="${projectService.IsCurrentTester(currentProject.id)}">
                                                <i class="bi bi-arrow-right"></i>
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="card col-2">
                            <div class="card-header bg-secondary text-white">CHECKING</div>
                            <div class="card-body">
                                <div class="card mb-2" th:each="task : ${tasksByStatus['Checking']}">
                                    <div class="card-body border-start border-4" th:classappend="${task.priority.name() == 'High'} ? 
                                        'border-danger' : (${task.priority.name() == 'Medium'} ? 
                                        'border-primary' : '')">
                                        <h5 th:text="${task.name}"></h5>
                                        <small th:text="${task.deadline}"></small>
                                        <small th:text="'Story Points: ' + ${task.storyPoints}" th:if="${task.storyPoints != null}"></small>
                                        <form th:action="@{/tasks/{id}/status(id=${task.id}, projectId=${currentProject.id})}" method="post">
                                            <input type="hidden" name="oldStatus" value="Checking">
                                            <button type="submit" class="btn btn-sm btn-primary mt-2"
                                                th:if="${projectService.IsCurrentManager(currentProject.id)}">
                                                <i class="bi bi-arrow-right"></i>
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="card col-2">
                            <div class="card-header bg-secondary text-white">COMPLETED</div>
                            <div class="card-body">
                                <div class="card mb-2" th:each="task : ${tasksByStatus['Completed']}">
                                    <div class="card-body border-start border-4" th:classappend="${task.priority.name() == 'High'} ? 
                                        'border-danger' : (${task.priority.name() == 'Medium'} ? 
                                        'border-primary' : '')">
                                        <h5 th:text="${task.name}"></h5>
                                        <small th:text="${task.deadline}"></small>
                                        <small th:text="'Story Points: ' + ${task.storyPoints}" th:if="${task.storyPoints != null}"></small>
                                        <form th:action="@{/tasks/{id}/status(id=${task.id}, projectId=${currentProject.id})}" method="post">
                                            <input type="hidden" name="oldStatus" value="Completed">
                                            <button type="submit" class="btn btn-sm btn-primary mt-2"
                                                th:if="${projectService.IsCurrentManager(currentProject.id)}">
                                                <i class="bi bi-arrow-left"></i>
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script>
            function toggleTasks(element){
                element.classList.toggle('active');
            }
        </script>
    </body>
</html>
