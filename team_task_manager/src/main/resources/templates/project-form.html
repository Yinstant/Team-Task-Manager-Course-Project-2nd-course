<!DOCTYPE html>
<html>
    <head>
        <title>Форма проекта</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body style="background-color: azure;">
        <div class="container border border-3 border-danger rounded my-5 
            d-flex align-items-center flex-column col-md-4 shadow bg-light">
            <h1 class="my-3" th:text="${project.id} == null ? 'Добавление проекта' : 'Редактирование проекта'"></h1><br>
            <form class="my-3" action="#" th:action="@{${project.id == null ? '/projects' : '/projects/' + project.id}}"
                th:object="${project}" method="post">
                <label class="my-3">Название: <input type="text" th:field="*{name}"></label>
                <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}"
                    style="color:red"></span><br>
                <label class="my-3">Описание: <textarea th:field="*{description}"></textarea></label><br>

                <button class="btn btn-primary my-3 d-block mx-auto" type="submit">Сохранить</button>
            </form>
            <a class="my-3" th:href="@{/projects/{pid}(pid = ${project.id})}">Назад к списку</a>
        </div>
    </body>
</html>
