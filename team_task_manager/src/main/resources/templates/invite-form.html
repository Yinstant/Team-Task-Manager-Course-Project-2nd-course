<!DOCTYPE html>
<html>
    <head>
        <title>Форма участника</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body style="background-color: azure;">
        <div class="container border border-3 border-danger rounded my-5 
            d-flex align-items-center flex-column col-md-4 shadow bg-light">
            <h1 class="my-3" th:text="${username == null ? 'Приглашение пользователя в проект' : 'Изменение ролей участника'}"></h1><br>
            <form class="my-3" action="#" th:action="@{${username == null ? '/projects/' + project.id + '/invite' : '/projects/' + project.id + '/editRoles'}}"
                method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <label class="my-3">Имя пользователя: 
                    <input th:if="${username == null}" type="text" name="username" required>
                    <input th:if="${username != null}" th:value="${username}" type="text" name="username" readonly>
                </label><br>

                <div th:each="role : ${availableRoles}">
                    <label>
                        <input type="checkbox" th:checked="${checkedRoles != null && checkedRoles.contains(role)}" name="checkedRoles" th:value="${role}" />
                        <span th:text="${role}"></span>
                    </label>
                </div><br>

                <button class="btn btn-primary my-3 d-block mx-auto" type="submit" th:text="${username == null ? 'Пригласить' : 'Изменить роли'}"></button>
            </form>
            <a class="my-3" th:href="@{/projects/{pid}(pid = ${project.id})}">Назад к списку</a>
        </div>
    </body>
</html>
