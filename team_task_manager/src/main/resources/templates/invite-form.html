<!DOCTYPE html>
<html>
    <head>
        <title>Форма участника</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <style>
            .card {
                transition: transform 0.2s, box-shadow 0.2s;
            }
            .card:hover {
                transform: translateY(-5px);
                box-shadow: 0 1rem 3rem rgba(0,0,0,.15) !important;
            }
        </style>
    </head>
    <body style="background-color: azure;">
        <div class="container d-flex align-items-center flex-column my-5">
        <div class="card shadow-lg border-0 rounded-4 h-100 col-lg-5">
            <div class="card-header bg-white border-0 pt-4 pb-0">
                <h4 class="text-center fw-semibold">
                    <i class="bi bi-person-plus me-2 text-secondary"></i>
                    <p class="m-0" th:text="${username == null ? 'Приглашение пользователя в проект' : 'Изменение ролей участника'}"></p>
                </h4>
            </div>
            <div class="card-body p-4">
                <form class="my-3" action="#" th:action="@{${username == null ? '/projects/' + project.id + '/invite' : '/projects/' + project.id + '/editRoles'}}"
                    method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="form-floating">
                        <input th:if="${username == null}" type="text" class="form-control" id="username" 
                            name="username" placeholder="Имя пользователя" required>
                        </input>

                        <input th:if="${username != null}" type="text" class="form-control" id="username" 
                            name="username" placeholder="Имя пользователя"  
                            th:value="${username}" readonly>
                        </input>

                        <label for="username">Имя пользователя</label>
                    </div><br>
                    
                    <div th:each="role : ${availableRoles}">
                        <label>
                            <input type="checkbox" th:checked="${checkedRoles != null && checkedRoles.contains(role)}" name="checkedRoles" th:value="${role}" />
                            <span th:text="${role}"></span>
                        </label>
                    </div><br>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg d-flex justify-content-center">
                            <i class="bi bi-check-lg"></i>
                            <p class="m-0" th:text="${username == null ? 'Пригласить' : 'Изменить роли'}"></p>
                        </button>
                        <a class="btn btn-outline-secondary" th:href="@{/projects/{pid}(pid = ${project.id})}">
                            <i class="bi bi-arrow-left"></i> Назад к списку
                        </a>
                    </div>
                </form>
            </div>
        </div>
        </div>
    </body>
</html>
