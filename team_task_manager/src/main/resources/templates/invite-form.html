<!DOCTYPE html>
<html>
    <head>
        <title>Приглашение пользователя в проект</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body style="background-color: azure;">
        <div class="container border border-3 border-danger rounded my-5 
            d-flex align-items-center flex-column col-md-4 shadow bg-light">
            <h1 class="my-3">Приглашение пользователя в проект</h1><br>
            <form class="my-3" action="#" th:action="@{/projects/{id}/invite(id=${project.id})}"
                method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <label class="my-3">Имя пользователя: <input type="text" name="username" required></label>

                <button class="btn btn-primary my-3 d-block mx-auto" type="submit">Пригласить</button>
            </form>
            <a class="my-3" th:href="@{/projects/{pid}(pid = ${project.id})}">Назад к списку</a>
        </div>
    </body>
</html>
