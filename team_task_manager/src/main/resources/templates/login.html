<!DOCTYPE html>
<html>
    <head>
        <title>Авторизация</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body style="background-color: azure;">
        <div class="container border border-3 border-danger rounded my-5 
            d-flex align-items-center flex-column col-md-4 shadow bg-light">
            <h1 class="my-3">Авторизация</h1>
            <form class="my-3" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <label class="my-3">Логин: <input type="text" name="username"></label><br>
                
                <label class="my-3">Пароль: <input type="password" name="password"></label><br>
                
                <button class="btn btn-primary my-3 d-block mx-auto" type="submit">Войти</button>
            </form>
            <a class="my-3" href="/register">К регистрации</a>
        </div>
    </body>
</html>
