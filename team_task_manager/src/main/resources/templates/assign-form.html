<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Распределение задачи</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 1rem 3rem rgba(0,0,0,.15) !important;
        }
        .border-left-highlight {
            border-left-width: 4px;
        }
    </style>
</head>
<body style="background-color: azure;">

<div class="container py-5">
    <div class="row justify-content-center g-4">
        <!-- Карточка с задачей -->
        <div class="col-lg-7" th:insert="~{fragments/task-cards/detailed-task-card :: detailed-task-card(${task})}"></div>

        <!-- Форма назначения -->
        <div class="col-lg-5">
            <div class="card shadow-lg border-0 rounded-4 h-100">
                <div class="card-header bg-white border-0 pt-4 pb-0">
                    <h4 class="text-center fw-semibold"><i class="bi bi-person-plus me-2"></i>Назначить исполнителя</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/tasks/{id}/assign(id=${task.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <input type="hidden" name="projectId" th:value="${task.project.id}" />

                        <div class="mb-4">
                            <label class="form-label fw-semibold"><i class="bi bi-people me-1"></i> Ответственный исполнитель</label>
                            <select name="executorId" class="form-select form-select-lg" required>
                                <option value="" disabled selected>-- Выберите пользователя --</option>
                                <option th:each="ex : ${executorList}" th:value="${ex.id}" th:text="${ex.username}"></option>
                            </select>
                            <div class="form-text">Только участники с ролью "Исполнитель" могут быть назначены.</div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-check-lg"></i> Распределить
                            </button>
                            <a th:href="@{/projects/{pid}/kanban(pid=${task.project.id})}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i> Назад к канбану
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
