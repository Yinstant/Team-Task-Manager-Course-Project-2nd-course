<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Рассмотрение задачи</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .card-detail {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card-detail:hover {
            transform: translateY(-5px);
            box-shadow: 0 1rem 3rem rgba(0,0,0,.15) !important;
        }
        .evaluation-item {
            border-left: 4px solid #0d6efd;
            transition: background 0.1s;
        }
        .evaluation-item:hover {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body style="background-color: azure;">

<div class="container py-5">
    <div class="row justify-content-center g-4">
        <!-- Карточка с задачей (левая колонка) -->
        <div class="col-lg-7">
            <div class="card shadow-lg border-0 rounded-4 overflow-hidden card-detail h-100">
                <div class="card-body p-4">
                    <!-- Заголовок с цветной полосой по приоритету -->
                    <div th:classappend="${task.priority.name() == 'High'} ? 'border-start border-danger border-4' : 
                                        (${task.priority.name() == 'Medium'} ? 'border-start border-primary border-4' : '')" 
                         class="ps-3">
                        <h3 class="card-title fw-bold" th:text="${task.name}">Название задачи</h3>
                        <div class="d-flex flex-wrap gap-3 mt-2 mb-3">
                            <span class="badge bg-secondary" th:text="'Проект: ' + ${task.project.name}"></span>
                            <span class="badge bg-info text-dark" th:if="${task.goal != null}" th:text="'Цель: ' + ${task.goal.name}"></span>
                            <span class="badge bg-warning text-dark" th:text="'Приоритет: ' + ${task.priority}"></span>
                            <span class="badge bg-success" th:text="'Story Points: ' + ${task.storyPoints}" th:if="${task.storyPoints != null}"></span>
                        </div>
                    </div>

                    <hr class="my-3">

                    <div class="row">
                        <div class="col-md-6">
                            <p><i class="bi bi-calendar-event me-2"></i> <strong>Дедлайн:</strong> 
                               <span th:text="${#temporals.format(task.deadline, 'dd.MM.yyyy')}"></span></p>
                            <p><i class="bi bi-clock-history me-2"></i> <strong>Создана:</strong> 
                               <span th:text="${#temporals.format(task.creationTime, 'dd.MM.yyyy HH:mm')}"></span></p>
                        </div>
                        <div class="col-md-6">
                            <p><i class="bi bi-arrow-repeat me-2"></i> <strong>Обновлена:</strong> 
                               <span th:text="${#temporals.format(task.updatedTime, 'dd.MM.yyyy HH:mm')}"></span></p>
                        </div>
                    </div>

                    <h5 class="mt-3"><i class="bi bi-card-text me-2"></i>Описание:</h5>
                    <div class="bg-light p-3 rounded-3">
                        <p class="mb-0" th:text="${task.description}"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Правая колонка: форма изменения статуса + список оценок -->
        <div class="col-lg-5">
            <div class="card shadow-lg border-0 rounded-4 h-100">
                <div class="card-header bg-white border-0 pt-4 pb-0">
                    <h4 class="text-center fw-semibold"><i class="bi bi-diagram-3 me-2"></i>Изменить статус</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/tasks/{id}/checking(id=${task.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <input type="hidden" name="projectId" th:value="${task.project.id}" />

                        <div class="mb-4">
                            <label class="form-label fw-semibold"><i class="bi bi-tag me-1"></i> Новый статус</label>
                            <select name="status" class="form-select form-select-lg" required>
                                <option value="" disabled selected>-- Выберите статус --</option>
                                <option th:each="status : ${statusList}" th:value="${status}" th:text="${status.name()}"></option>
                            </select>
                            <div class="form-text">Выберите новое состояние для задачи.</div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-arrow-repeat"></i> Применить статус
                            </button>
                            <a th:href="@{/projects/{pid}/kanban(pid=${task.project.id})}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i> Назад к канбану
                            </a>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Список оценок (если есть) -->
            <div class="card shadow-lg border-0 rounded-4 mt-4" th:if="${evalList != null && evalList.size() != 0}">
                <div class="card-header bg-white border-0 pt-3 pb-0">
                    <h5 class="fw-semibold"><i class="bi bi-star-fill text-warning me-2"></i>Оценки задачи</h5>
                </div>
                <div class="card-body p-3">
                    <div class="list-group list-group-flush">
                        <div th:each="eval : ${evalList}" class="list-group-item px-0 pt-2 pb-2 evaluation-item">
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="badge bg-success rounded-pill" th:text="'Оценка: ' + ${eval.score} + '/5'"></span>
                                <small class="text-muted" th:text="'Проверяющий: ' + ${eval.reviewer.username}"></small>
                            </div>
                            <div class="mt-2">
                                <i class="bi bi-chat-left-text me-1 text-secondary"></i>
                                <span th:text="${eval.commentary}" class="small"></span>
                            </div>
                            <small class="text-muted mt-1 d-block" th:text="${#temporals.format(eval.creationTime, 'dd.MM.yyyy HH:mm')}"></small>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Если оценок нет -->
            <div class="card shadow-sm border-0 rounded-4 mt-4 bg-light text-center" th:if="${evalList == null || evalList.size() == 0}">
                <div class="card-body">
                    <i class="bi bi-info-circle fs-2 text-secondary"></i>
                    <p class="mb-0">Оценок для этой задачи пока нет.</p>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
