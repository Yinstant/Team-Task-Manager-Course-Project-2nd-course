<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <title>Task Manager</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <style>
            .card-detail:hover {
                transform: translateY(-2px);
                box-shadow: 0 1rem 3rem rgba(0,0,0,.15) !important;
            }
        </style>
        <meta name="_csrf" th:content="${_csrf.token}"/>
        <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark" th:replace="~{fragments/navbar :: navbar}"></nav>
        
        <div class="offcanvas offcanvas-start" tabindex="-1"
        id="sidebarOffcanvas" aria-laballedby="sidebarLabel">
            <div class="offcanvas-header">
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas"
                aria-label="Закрыть"></button>
            </div>
            <div class="offcanvas-body bg-light" th:insert="~{fragments/sidebar :: sidebar}"></div>
        </div>

        <div class="container-fluid">
            <div class="row">
                <div class="col-lg-3 d-lg-block d-none bg-light" th:insert="~{fragments/sidebar :: sidebar}"></div>
                
                <div class="col-md-9" th:if="${currentProject == null}">
                    <h1>Выберите проект из левого меню</p>
                </div>

                <div class="col-md-9" th:if="${currentProject != null}">
                    <!-- Заголовок -->
                    <h1>Оценка задач</h1>

                    <!-- Раздел 1: Задачи, ожидающие оценки -->
                    <h2>На проверке (без оценки)</h2>
                    <div class="row">
                        <h4 th:if="${reviewTasks.size() == 0}">--Нет таких--</h4>
                        <div class="card my-3 shadow card-detail" th:each="task : ${reviewTasks}">
                            <div class="card-body border-start border-4" th:classappend="${task.priority.name() == 'High'} ? 
                                'border-danger' : (${task.priority.name() == 'Medium'} ? 
                                'border-primary' : '')">
                                <h5 th:text="${task.name}"></h5>
                                <small th:text="${task.deadline}"></small>
                                <small th:text="'Story Points: ' + ${task.storyPoints}" th:if="${task.storyPoints != null}"></small>
                                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#evalModal" 
                                    th:data-task-id="${task.id}">Оценить</button>
                            </div>
                        </div>
                    </div>

                    <!-- Раздел 2: История оценок -->
                    <h2>Выставленные оценки</h2>
                    <table class="table">
                        <thead>...</thead>
                        <tbody>
                            <tr th:each="eval : ${myEvaluations}">
                                <td th:text="${eval.task.name}">...</td>
                                <td th:text="${eval.score}">...</td>
                                <td th:text="${eval.commentary}">...</td>
                            </tr>
                        </tbody>
                    </table>

                    <!-- Модалка оценки -->
                    <div class="modal fade" id="evalModal" tabindex="-1">
                        <div class="modal-dialog">
                            <div class="modal-content border border-3 border-danger rounded my-5 
                                d-flex align-items-center flex-column col-md-4 shadow bg-light">
                                <h2 class="my-3">Новая оценка</h2>
                                <form method="post" action="" name="reviewForm" class="d-flex flex-column gap-1">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <input type="hidden" name="projectId" th:value="${currentProject.id}">
                                    <!-- Поля оценки -->
                                    <label>Оценка (1-5):</label><br>
                                    <input type="number" name="score" min="1" max="5" required><br>
                                    <label>Комментарий:</label><br>
                                    <textarea name="comment" rows="4"></textarea><br>
                                    <button type="submit" class="d-block mx-auto my-3">Сохранить</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="/js/script.js"></script>
        <script>
            function toggleTasks(element){
                element.classList.toggle('active');
            }
        </script>
    </body>
</html>
