<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <title>Task Manager</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <style>
            .card-detail:hover {
                transform: translateY(-2px);
                box-shadow: 0 1rem 3rem rgba(0,0,0,.15) !important;
            }
        </style>
        <meta name="_csrf" th:content="${_csrf.token}"/>
        <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark" th:replace="~{fragments/navbar :: navbar}"></nav>
        
        <div class="offcanvas offcanvas-start" tabindex="-1"
        id="sidebarOffcanvas" aria-laballedby="sidebarLabel">
            <div class="offcanvas-header">
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas"
                aria-label="Закрыть"></button>
            </div>
            <div class="offcanvas-body bg-light" th:insert="~{fragments/sidebar :: sidebar}"></div>
        </div>

        <div class="container-fluid">
            <div class="row">
                <div class="col-lg-3 d-lg-block d-none bg-light" th:insert="~{fragments/sidebar :: sidebar}"></div>
                
                <div class="col-lg-9 p-4" th:if="${currentProject == null}">
                    <div class="text-center py-5">
                        <i class="bi bi-folder2-open" style="font-size: 4rem; color: #6c757d;"></i>
                        <h3 class="mt-3 text-muted">Проект не выбран</h3>
                        <p class="text-secondary">Выберите проект из левого меню или создайте новый</p>
                    </div>
                </div>

                <div class="col-lg-9" th:if="${currentProject != null}">
                    <!-- Заголовок -->
                    <div class="d-flex align-items-center gap-3 my-5 px-4">
                        <h1 class="text-truncate mb-0" th:text="${currentProject.name}"></h1>
                        <span class="badge bg-secondary align-middle">Оценка задач</span>
                    </div>

                    <!-- Раздел 1: Задачи, ожидающие оценки -->
                    <h2>На проверке (без оценки)</h2>
                    <div class="row">
                        <h4 th:if="${reviewTasks.size() == 0}">--Нет таких--</h4>
                        <div class="d-flex flex-column gap-3">
                            <div th:each="task : ${reviewTasks}">
                                <div th:replace="~{fragments/task-cards/list-task-card :: 
                                    list-task-card(task=${task}, status='Review', btnText='На рассмотрение', 
                                    isActive=${projectService.IsCurrentTester(currentProject.id)}, isReview=true)}"></div>  
                            </div>
                        </div>
                    </div>

                    <!-- Раздел 2: История оценок -->
                    <h2>Выставленные оценки</h2>
                    <div class="table-responsive" th:if="${myEvaluations != null && myEvaluations.size() > 0}">
                        <table class="table table-striped table-hover table-bordered align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th>Задача</th>
                                    <th>Оценка</th>
                                    <th>Комментарий</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="eval : ${myEvaluations}">
                                    <td th:text="${eval.task.name}">...</td>
                                    <td class="text-center">
                                        <span class="badge" 
                                            th:classappend="${eval.score == 5 ? 'bg-success' : (eval.score >= 3 ? 'bg-warning text-dark' : 'bg-danger')}"
                                            th:text="${eval.score} + '/5'"></span>
                                    </td>
                                    <td th:text="${eval.commentary}">...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Модалка оценки -->
                    <div class="modal fade" id="evalModal" aria-labelledby="evalModalLabel" tabindex="-1" aria-hidden="true">
                        <div class="modal-dialog modal-dialog-centered">
                            <div class="modal-content shadow bg-light rounded-4">
                                <div class="modal-header bg-white rounded-top-4">
                                    <h5 class="modal-title fw-bold" id="evalModalLabel">
                                        <i class="bi bi-star-fill me-2"></i>Новая оценка
                                    </h5>
                                    <button type="button" class="btn-close btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                                </div>
                                <form method="post" action="" name="reviewForm" class="d-flex flex-column gap-1 p-4">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <input type="hidden" name="projectId" th:value="${currentProject.id}">
                                    
                                    <div class="form-floating">
                                        <input type="number" class="form-control" id="score" name="score" min="1" max="5" placeholder="Оценка" required>
                                        <label for="score">Оценка (1–5)</label>
                                    </div>
                                    <div class="form-floating">
                                        <textarea class="form-control" id="comment" name="comment" style="min-height: 200px; width: 100%;" placeholder="Комментарий"></textarea>
                                        <label for="comment">Комментарий</label>
                                    </div>
                                    <div class="d-grid gap-2">
                                        <button type="submit" class="btn btn-primary btn-lg">
                                            <i class="bi bi-check-lg"></i> Сохранить
                                        </button>
                                        <a data-bs-dismiss="modal" class="btn btn-outline-secondary">
                                            <i class="bi bi-arrow-left"></i> Отмена
                                        </a>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:replace="~{fragments/task-modal :: task-modal}"></div>
        <script src="/js/script.js"></script>
        <script>
            function toggleTasks(element){
                element.classList.toggle('active');
            }
        </script>
    </body>
</html>
