<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <title>Task Manager</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <style>
            .card-detail:hover {
                transform: translateY(-2px);
                box-shadow: 0 1rem 3rem rgba(0,0,0,.15) !important;
            }
        </style>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark" th:replace="~{fragments/navbar :: navbar}"></nav>

        <div class="offcanvas offcanvas-start" tabindex="-1"
        id="sidebarOffcanvas" aria-laballedby="sidebarLabel">
            <div class="offcanvas-header">
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas"
                aria-label="Закрыть"></button>
            </div>
            <div class="offcanvas-body bg-light" th:insert="~{fragments/sidebar :: sidebar}"></div>
        </div>

        <div class="container-fluid">
            <div class="row">
                <div class="col-lg-3 d-lg-block d-none bg-light" th:insert="~{fragments/sidebar :: sidebar}"></div>
                
                <div class="col-lg-9 p-4" th:if="${currentProject == null}">
                    <div class="text-center py-5">
                        <i class="bi bi-folder2-open" style="font-size: 4rem; color: #6c757d;"></i>
                        <h3 class="mt-3 text-muted">Проект не выбран</h3>
                        <p class="text-secondary">Выберите проект из левого меню или создайте новый</p>
                    </div>
                </div>

                <div class="col-lg-9" th:if="${currentProject != null}">
                    <!-- Заголовок -->
                    <div class="d-flex align-items-center gap-3 my-5 px-4">
                        <h1 class="text-truncate mb-0" th:text="${currentProject.name}"></h1>
                        <span class="badge bg-secondary align-middle">Отчёты</span>
                    </div>
                    
                    <div th:if="${message}" th:text="${message}" style="color:green"></div>
                    <div th:if="${error}" th:text="${error}" style="color:red"></div>
                    
                    <div class="row d-flex justify-content-around">
                        <a class="col-lg-4 btn btn-primary my-3"
                            th:href="@{/projects/{id}/export(id=${currentProject.id})}">
                            <i class="bi bi-download"></i> Экспорт задач (CSV)</a>
                        
                        <button type="button" class="col-lg-4 btn btn-info my-3" data-bs-toggle="modal" data-bs-target="#importModal">
                            <i class="bi bi-upload"></i> Импорт задач (CSV)
                        </button>
                    </div>

                    <h2>Статусы задач</h2>
                    <table class="table" th:if="${countByStatus != null}">
                        <thead>
                            <tr><th>Статус</th><th>Количество</th><th>Процент</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="entry : ${countByStatus}">
                                <td th:text="${entry.key}"></td>
                                <td th:text="${entry.value}"></td>
                                <td>
                                    <div class="progress">
                                        <div class="progress-bar" th:style="'width: ' + (${totalTasks != null && totalTasks > 0 ? entry.value * 100 / totalTasks : 0}) + '%'"></div>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="modal fade" id="importModal" tabindex="-1">
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <form th:action="@{/projects/{id}/import(id=${currentProject.id})}" method="post" enctype="multipart/form-data">
                                <!-- <form> -->
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <div class="modal-header">
                                        <h5 class="modal-title">Импорт задач из CSV</h5>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                    </div>
                                    <div class="modal-body">
                                        <div class="mb-3">
                                            <label class="form-label">CSV файл</label>
                                            <input type="file" class="form-control" name="file" accept=".csv" required>
                                            <div class="form-text">Формат: "Название","Описание","Дедлайн (YYYY-MM-DD)","Story Points (1-10)","Приоритет (High/Medium/Low)"</div>
                                        </div>
                                    </div>
                                    <div class="modal-footer">
                                        <button type="submit" class="btn btn-primary">Импортировать</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div> 
    </body>
</html>
