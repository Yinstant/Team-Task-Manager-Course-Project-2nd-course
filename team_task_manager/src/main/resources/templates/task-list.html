<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <title>Task Manager</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <style>
            .tree .goal-header {
                cursor: pointer;
                background-color: #ffeaa6;
                padding: 8px;
                margin-top: 8px;
                margin-bottom: 4px;
                border-radius: 4px;
            }
            .tree .task-list {
                margin-left: 20px;
                display: none;
            }
            .tree .goal-header.active + .task-list {
                display: block;
            }
            .light-blue{
                background-color: rgb(199, 254, 254);
            }
        </style>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark" th:replace="~{fragments/navbar :: navbar}"></nav>
        
        <div class="offcanvas offcanvas-start" tabindex="-1"
        id="sidebarOffcanvas" aria-laballedby="sidebarLabel">
            <div class="offcanvas-header">
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas"
                aria-label="Закрыть"></button>
            </div>
            <div class="offcanvas-body bg-light" th:insert="~{fragments/sidebar :: sidebar}"></div>
        </div>

        <div class="container-fluid">
            <div class="row">
                <div class="col-lg-3 d-lg-block d-none bg-light" th:insert="~{fragments/sidebar :: sidebar}"></div>
                
                <div class="col-md-9" th:if="${currentProject == null}">
                    <h1>Выберите проект из левого меню</p>
                </div>

                <div class="col-md-9" th:if="${currentProject != null}">
                    <h1 class="my-5 text-truncate" th:text="'Список задач проекта: ' + ${currentProject.name}"></h1>
                    
                    <div class="d-flex mx-3 pb-3">
                        <a class="btn btn-primary mx-3" th:href="@{/tasks/new(projectId=${currentProject.id})}"
                            th:if="${projectService.IsCurrentManager(currentProject.id)}">+ Новая задача</a>
                        <a class="btn btn-primary mx-3" th:href="@{/goals/new(projectId=${currentProject.id})}"
                            th:if="${projectService.IsCurrentManager(currentProject.id)}">+ Новая цель</a>
                    </div>
                    
                    <div th:if="${message}" th:text="${message}" style="color:green"></div>
                    
                    <div class="tree shadow-sm m-3">
                        <div th:each="entry : ${tasksByGoal}">
                            <div class="goal-header" onclick="toggleTasks(this)">
                                <strong th:text="${entry.key.name}"></strong>
                                <a class="btn btn-sm btn-outline-danger float-end mx-2 ms-auto" 
                                    th:href="@{/goals/{id}/delete(id=${entry.key.id}, projectId=${currentProject.id})}"
                                    th:if="${projectService.IsCurrentManager(currentProject.id)}">Delete</a>
                                <a class="btn btn-sm btn-outline-warning float-end mx-1 ms-auto" 
                                    th:href="@{/goals/{id}/edit(id=${entry.key.id}, projectId=${currentProject.id})}"
                                    th:if="${projectService.IsCurrentManager(currentProject.id)}">Edit</a>
                            </div>
                            <div class="task-list">
                                <ul class="list-group my-2">
                                    <li class="list-group-item my-2 light-blue shadow-sm" th:each="task : ${entry.value}">
                                        <strong th:text="${task.name}"></strong>
                                        <span class="badge" 
                                            th:classappend="${task.status.name() == 'ToDo'} ? 'bg-secondary' : 
                                            (${task.status.name() == 'InProgress'} ? 'bg-primary' : 
                                            (${task.status.name() == 'Review'} ? 'bg-dark' : 'bg-success'))" 
                                            th:text="${task.status}"></span>
                                        <a class="btn btn-sm btn-outline-danger float-end mx-2 ms-auto" 
                                            th:href="@{/tasks/{id}/delete(id=${task.id}, projectId=${currentProject.id})}"
                                            th:if="${projectService.IsCurrentManager(currentProject.id)}">Delete</a>
                                        <a class="btn btn-sm btn-outline-warning float-end mx-1 ms-auto" 
                                            th:href="@{/tasks/{id}/edit(id=${task.id}, projectId=${currentProject.id})}"
                                            th:if="${projectService.IsCurrentManager(currentProject.id)}">Edit</a>
                                    </li>
                                </ul>
                            </div>
                        </div>

                        <div class="tasks-list">
                            <ul class="list-group my-2 mx-1">
                                <li class="list-group-item my-2 light-blue shadow-sm border" th:each="task : ${tasksWithoutGoal}">
                                    <strong th:text="${task.name}"></strong>
                                    <span class="badge" th:classappend="${task.status.name() == 'ToDo'} ? 'bg-secondary' : 
                                        (${task.status.name() == 'InProgress'} ? 'bg-primary' : 
                                        (${task.status.name() == 'Review'} ? 'bg-dark' : 'bg-success'))" 
                                        th:text="${task.status}"></span>
                                    <a class="btn btn-sm btn-outline-danger float-end mx-2 ms-auto" 
                                        th:href="@{/tasks/{id}/delete(id=${task.id}, projectId=${currentProject.id})}"
                                        th:if="${projectService.IsCurrentManager(currentProject.id)}">Delete</a>
                                    <a class="btn btn-sm btn-outline-warning float-end mx-1 ms-auto" 
                                        th:href="@{/tasks/{id}/edit(id=${task.id}, projectId=${currentProject.id})}"
                                        th:if="${projectService.IsCurrentManager(currentProject.id)}">Edit</a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script>
            function toggleTasks(element){
                element.classList.toggle('active');
            }
        </script>
    </body>
</html>
