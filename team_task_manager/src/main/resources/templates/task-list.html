<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <title>Task Manager</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <style>
            .tree .goal-header {
                cursor: pointer;
                background-color: #dbdbdb;
                padding: 8px;
                margin-top: 8px;
                margin-bottom: 4px;
                border-radius: 4px;
            }
            .tree .task-list {
                margin-left: 20px;
                display: none;
            }
            .tree .goal-header.active + .task-list {
                display: block;
            }
            .light-blue{
                background-color: rgb(199, 254, 254);
            }
            .card-detail:hover {
                transform: translateY(-2px);
                box-shadow: 0 1rem 3rem rgba(0,0,0,.15) !important;
            }
        </style>
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark" th:replace="~{fragments/navbar :: navbar}"></nav>
        
        <div class="offcanvas offcanvas-start" tabindex="-1"
        id="sidebarOffcanvas" aria-laballedby="sidebarLabel">
            <div class="offcanvas-header">
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas"
                aria-label="Закрыть"></button>
            </div>
            <div class="offcanvas-body bg-light" th:insert="~{fragments/sidebar :: sidebar}"></div>
        </div>

        <div class="container-fluid">
            <div class="row">
                <div class="col-lg-3 d-lg-block d-none bg-light" th:insert="~{fragments/sidebar :: sidebar}"></div>
                
                <div class="col-lg-9 p-4" th:if="${currentProject == null}">
                    <div class="text-center py-5">
                        <i class="bi bi-folder2-open" style="font-size: 4rem; color: #6c757d;"></i>
                        <h3 class="mt-3 text-muted">Проект не выбран</h3>
                        <p class="text-secondary">Выберите проект из левого меню или создайте новый</p>
                    </div>
                </div>

                <div class="col-lg-9" th:if="${currentProject != null}">
                    <div class="d-flex align-items-center gap-3 my-5 px-4">
                        <h1 class="text-truncate mb-0" th:text="${currentProject.name}"></h1>
                        <span class="badge bg-secondary align-middle">Дерево целей</span>
                    </div>
                    
                    <div class="d-flex mx-3 pb-3">
                        <a class="btn btn-primary mx-3" th:href="@{/tasks/new(projectId=${currentProject.id})}"
                            th:if="${projectService.IsCurrentManager(currentProject.id)}">+ Новая задача</a>
                        <a class="btn btn-primary mx-3" th:href="@{/goals/new(projectId=${currentProject.id})}"
                            th:if="${projectService.IsCurrentManager(currentProject.id)}">+ Новая цель</a>
                    </div>
                    
                    <div th:if="${message}" th:text="${message}" style="color:green"></div>
                    
                    <div class="tree shadow-sm m-3">
                        <div th:each="entry : ${tasksByGoal}">
                            <div class="card my-3 shadow card-detail goal-header" onclick="toggleTasks(this)">
                                <div class="card-body border-start border-4 d-flex align-center justify-content-between">
                                    <h3><strong th:text="${entry.key.name}"></strong></h3>
                                    <div>
                                        <a class="btn btn-lg btn-danger float-end mx-2 ms-auto" 
                                            th:href="@{/goals/{id}/delete(id=${entry.key.id}, projectId=${currentProject.id})}"
                                            th:if="${projectService.IsCurrentManager(currentProject.id)}">
                                            <i class="bi bi-trash"></i>
                                        </a>
                                        <a class="btn btn-lg btn-warning float-end mx-1 ms-auto" 
                                            th:href="@{/goals/{id}/edit(id=${entry.key.id}, projectId=${currentProject.id})}"
                                            th:if="${projectService.IsCurrentManager(currentProject.id)}">
                                            <i class="bi bi-pencil-square"></i>
                                        </a>
                                    </div>
                                </div>
                            </div>
                            <div class="task-list">
                                <div class="d-flex flex-column gap-3">
                                    <div th:each="task : ${entry.value}">
                                        <div th:if="${task.status.name() == 'ToDo'}" 
                                            th:insert="~{fragments/task-cards/list-task-card :: 
                                            list-task-card(task=${task}, status='ToDo', btnText='В работу', 
                                            isActive=${projectService.IsCurrentManager(currentProject.id)}, isReview=false)}"></div>
                                        <div th:if="${task.status.name() == 'InProgress'}" 
                                            th:insert="~{fragments/task-cards/list-task-card :: 
                                            list-task-card(task=${task}, status='InProgress', btnText='На проверку', 
                                            isActive=${projectService.IsCurrentExecutor(currentProject.id)}, isReview=false)}"></div>
                                        <div th:if="${task.status.name() == 'Review'}" 
                                            th:insert="~{fragments/task-cards/list-task-card :: 
                                            list-task-card(task=${task}, status='Review', btnText='На рассмотрение', 
                                            isActive=${projectService.IsCurrentTester(currentProject.id)}, isReview=false)}"></div>
                                        <div th:if="${task.status.name() == 'Checking'}" 
                                            th:insert="~{fragments/task-cards/list-task-card :: 
                                            list-task-card(task=${task}, status='Checking', btnText='Рассмотреть', 
                                            isActive=${projectService.IsCurrentManager(currentProject.id)}, isReview=false)}"></div>
                                        <div th:if="${task.status.name() == 'Completed'}" 
                                            th:insert="~{fragments/task-cards/list-task-card :: 
                                            list-task-card(task=${task}, status='Completed', btnText='Вернуть', 
                                            isActive=${projectService.IsCurrentManager(currentProject.id)}, isReview=false)}"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="tasks-list">
                            <div class="d-flex flex-column gap-3">
                                <div th:each="task : ${tasksWithoutGoal}">
                                    <div th:if="${task.status.name() == 'ToDo'}" 
                                        th:insert="~{fragments/task-cards/list-task-card :: 
                                        list-task-card(task=${task}, status='ToDo', btnText='В работу', 
                                        isActive=${projectService.IsCurrentManager(currentProject.id)}, isReview=false)}"></div>
                                    <div th:if="${task.status.name() == 'InProgress'}" 
                                        th:insert="~{fragments/task-cards/list-task-card :: 
                                        list-task-card(task=${task}, status='InProgress', btnText='На проверку', 
                                        isActive=${projectService.IsCurrentExecutor(currentProject.id)}, isReview=false)}"></div>
                                    <div th:if="${task.status.name() == 'Review'}" 
                                        th:insert="~{fragments/task-cards/list-task-card :: 
                                        list-task-card(task=${task}, status='Review', btnText='На рассмотрение', 
                                        isActive=${projectService.IsCurrentTester(currentProject.id)}, isReview=false)}"></div>
                                    <div th:if="${task.status.name() == 'Checking'}" 
                                        th:insert="~{fragments/task-cards/list-task-card :: 
                                        list-task-card(task=${task}, status='Checking', btnText='Рассмотреть', 
                                        isActive=${projectService.IsCurrentManager(currentProject.id)}, isReview=false)}"></div>
                                    <div th:if="${task.status.name() == 'Completed'}" 
                                        th:insert="~{fragments/task-cards/list-task-card :: 
                                        list-task-card(task=${task}, status='Completed', btnText='Вернуть', 
                                        isActive=${projectService.IsCurrentManager(currentProject.id)}, isReview=false)}"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:replace="~{fragments/task-modal :: task-modal}"></div>
        <script src="/js/script.js"></script>
        <script>
            function toggleTasks(element){
                element.classList.toggle('active');
            }
        </script>
    </body>
</html>
